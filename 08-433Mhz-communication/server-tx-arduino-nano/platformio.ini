[platformio]
description = Wireless tx example for Arduino Nano
default_envs = nano

[env]
monitor_speed = 115200
framework = arduino
lib_deps =
    sui77/rc-switch@^2.6.4

[env:esp32dev]
platform = espressif32
board = esp32dev
upload_speed = 921600 # uncomment if you have issues with uploading

[env:nano]
platform = atmelavr
board = nanoatmega328new