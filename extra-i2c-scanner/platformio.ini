[platformio]
description = i2c scanner sketch for Arduino Nano and ESP32
default_envs = esp32dev

[env]
monitor_speed = 115200
framework = arduino

[env:esp32dev]
platform = espressif32
board = esp32dev
upload_speed = 921600 # uncomment if you have issues with uploading

[env:nano]
platform = atmelavr
board = nanoatmega328new